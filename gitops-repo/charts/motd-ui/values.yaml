image:
  repository: ghcr.io/sleepymouse/motd-ui
  tag: latest
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-credentials

replicaCount: 1

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

motdBackend:
  host: motd-dev.app-motd-dev.svc.cluster.local
  port: 8000

ingress:
  enabled: true
  ingressClassName: nginx
  host: motd-ui.local

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "200m"

livenessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 3
  periodSeconds: 5
