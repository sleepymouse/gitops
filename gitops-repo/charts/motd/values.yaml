image:
  repository: ghcr.io/sleepymouse/motd
  tag: latest
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-credentials

replicaCount: 1

env:
  - name: SPRING_PROFILES_ACTIVE
    value: "prod"

service:
  type: ClusterIP
  port: 9000
  targetPort: 9000

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: 9000
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: 9000
  initialDelaySeconds: 15
  periodSeconds: 5
