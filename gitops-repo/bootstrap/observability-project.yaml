apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: observability
  namespace: argocd
spec:
  description: Observability platform - MinIO, Mimir, Loki, Tempo, Grafana, Alloy

  sourceRepos:
    - https://github.com/sleepymouse/gitops.git
    - https://charts.min.io/
    - https://grafana.github.io/helm-charts
    - https://prometheus-community.github.io/helm-charts

  destinations:
    - namespace: observability
      server: https://kubernetes.default.svc
    - namespace: argocd
      server: https://kubernetes.default.svc

  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
