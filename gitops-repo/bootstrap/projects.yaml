apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform
  namespace: argocd
spec:
  description: Platform services

  sourceRepos:
    - https://github.com/sleepymouse/gitops.git

  destinations:
    - namespace: app-*
      server: https://kubernetes.default.svc

  clusterResourceWhitelist:
    - group: "*"
      kind: "*"