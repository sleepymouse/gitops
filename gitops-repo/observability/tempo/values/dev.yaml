traces:
  otlp:
    grpc:
      enabled: true
    http:
      enabled: true

storage:
  trace:
    backend: s3
    s3:
      endpoint: minio.observability.svc.cluster.local:9000
      bucket: tempo-traces
      access_key: minioadmin
      secret_key: minioadmin
      insecure: true
      forcepathstyle: true

distributor:
  replicas: 1

ingester:
  replicas: 1

querier:
  replicas: 1

queryFrontend:
  replicas: 1

compactor:
  replicas: 1
