mimir:
  structuredConfig:
    common:
      storage:
        backend: s3
        s3:
          endpoint: seaweedfs-all-in-one.observability.svc.cluster.local:8333
          access_key_id: seaweedfsadmin
          secret_access_key: seaweedfsadmin
          insecure: true

    blocks_storage:
      s3:
        bucket_name: mimir-blocks

    ruler_storage:
      s3:
        bucket_name: mimir-ruler

    alertmanager_storage:
      s3:
        bucket_name: mimir-alertmanager

    ingester:
      ring:
        replication_factor: 1

    store_gateway:
      sharding_ring:
        replication_factor: 1

ingester:
  replicas: 1
  zoneAwareReplication:
    enabled: false

distributor:
  replicas: 1

querier:
  replicas: 1

query_frontend:
  replicas: 1

query_scheduler:
  replicas: 1

ruler:
  replicas: 1

compactor:
  replicas: 1

store_gateway:
  replicas: 1
  zoneAwareReplication:
    enabled: false

alertmanager:
  enabled: true
  replicas: 1

rollout_operator:
  enabled: false

minio:
  enabled: false
