# Dev credentials - replace with SSO in production
adminPassword: admin

# Without this, admin password changes and any UI-created state (dashboards,
# alert rules, etc.) don't survive a pod restart/recreation - the chart
# defaults to no persistent storage.
persistence:
  enabled: true
  type: pvc
  accessModes:
    - ReadWriteOnce
  size: 1Gi

ingress:
  enabled: true
  ingressClassName: nginx
  hosts:
    - grafana.local

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Mimir
        type: prometheus
        uid: mimir
        url: http://mimir-gateway.observability.svc.cluster.local/prometheus
        isDefault: true
        jsonData:
          httpMethod: POST

      - name: Loki
        type: loki
        uid: loki
        url: http://loki-gateway.observability.svc.cluster.local
        jsonData:
          derivedFields:
            - name: TraceID
              matcherRegex: '"traceId":"(\w+)"'
              url: "$${__value.raw}"
              datasourceUid: tempo

      - name: Tempo
        type: tempo
        uid: tempo
        url: http://tempo-query-frontend.observability.svc.cluster.local:3200
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
            filterByTraceID: true
          serviceMap:
            datasourceUid: mimir
          nodeGraph:
            enabled: true
          lokiSearch:
            datasourceUid: loki

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/default

# Pre-built community dashboards, pulled from grafana.com on pod start.
# `datasource` is matched by name against the `datasources` block above.
dashboards:
  default:
    node-exporter-full:
      gnetId: 1860
      revision: 45
      datasource: Mimir
    kubernetes-views-global:
      gnetId: 15757
      revision: 43
      datasource: Mimir
    jvm-micrometer:
      gnetId: 4701
      revision: 10
      datasource: Mimir
    logs-app:
      gnetId: 13639
      revision: 2
      datasource: Loki
    # Forked from gnetId 24685 (revision 1): every panel hardcodes the
    # original author's datasource UID (PAE45454D0EDB9216) via the newer
    # multi-line `"datasource": {"type":..., "uid":...}` object form, which
    # the chart's single-line sed substitution can't rewrite - unlike the
    # other dashboards here. Fixed copy lives at
    # gitops-repo/observability/grafana/dashboards/alloy-k8s-microservices.json
    # with that UID replaced by our real "mimir" datasource uid.
    alloy-k8s-microservices:
      url: https://raw.githubusercontent.com/sleepymouse/gitops/main/gitops-repo/observability/grafana/dashboards/alloy-k8s-microservices.json
