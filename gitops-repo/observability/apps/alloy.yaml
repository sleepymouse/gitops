apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alloy
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: observability
  description: Telemetry collector and forwarder. Receives OTLP from Spring Boot apps, scrapes Kubernetes pod logs, kube-state-metrics and node-exporter, then forwards metrics to Mimir, logs to Loki and traces to Tempo.

  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: alloy
      targetRevision: 1.10.0
      helm:
        valueFiles:
          - $values/gitops-repo/observability/alloy/values/dev.yaml
    - repoURL: https://github.com/sleepymouse/gitops.git
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: observability

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
