alloy:
  configMap:
    content: |
      // OTLP receiver - accepts telemetry from Spring Boot apps
      otelcol.receiver.otlp "default" {
        grpc { endpoint = "0.0.0.0:4317" }
        http { endpoint = "0.0.0.0:4318" }
        output {
          metrics = [otelcol.processor.batch.default.input]
          logs    = [otelcol.processor.batch.default.input]
          traces  = [otelcol.processor.batch.default.input]
        }
      }

      otelcol.processor.batch "default" {
        output {
          metrics = [otelcol.exporter.prometheus.default.input]
          logs    = [otelcol.exporter.loki.default.input]
          traces  = [otelcol.exporter.otlp.tempo.input]
        }
      }

      // Convert OTLP metrics to Prometheus format and remote write to Mimir
      otelcol.exporter.prometheus "default" {
        forward_to = [prometheus.remote_write.mimir.receiver]
      }

      prometheus.remote_write "mimir" {
        endpoint {
          url = "http://mimir-gateway.observability.svc.cluster.local/api/v1/push"
        }
      }

      // Forward OTLP logs to Loki
      otelcol.exporter.loki "default" {
        forward_to = [loki.write.default.receiver]
      }

      loki.write "default" {
        endpoint {
          url = "http://loki-gateway.observability.svc.cluster.local/loki/api/v1/push"
        }
      }

      // Forward traces to Tempo
      otelcol.exporter.otlp "tempo" {
        client {
          endpoint = "tempo-distributor.observability.svc.cluster.local:4317"
          tls { insecure = true }
        }
      }

      // Kubernetes pod log collection
      discovery.kubernetes "pods" {
        role = "pod"
      }

      loki.source.kubernetes "pods" {
        targets    = discovery.kubernetes.pods.targets
        forward_to = [loki.write.default.receiver]
      }

      // Scrape kube-state-metrics
      prometheus.scrape "kube_state_metrics" {
        targets    = [{"__address__" = "kube-state-metrics.observability.svc.cluster.local:8080"}]
        forward_to = [prometheus.remote_write.mimir.receiver]
      }

      // Scrape node-exporter
      prometheus.scrape "node_exporter" {
        targets    = [{"__address__" = "node-exporter-prometheus-node-exporter.observability.svc.cluster.local:9100"}]
        forward_to = [prometheus.remote_write.mimir.receiver]
      }

controller:
  type: daemonset
